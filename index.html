<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dostype | 陀氏人格档案</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="start-screen" id="startScreen" aria-labelledby="siteTitle">
        <div class="portrait-wrap">
          <svg class="portrait" viewBox="0 0 420 320" role="img" aria-label="陀思妥耶夫斯基肖像">
            <defs>
              <radialGradient id="paper" cx="50%" cy="32%" r="70%">
                <stop offset="0" stop-color="#3a3937" />
                <stop offset="0.55" stop-color="#151515" />
                <stop offset="1" stop-color="#050505" />
              </radialGradient>
              <filter id="grain">
                <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" stitchTiles="stitch" />
                <feColorMatrix type="saturate" values="0" />
                <feComponentTransfer>
                  <feFuncA type="table" tableValues="0 0.16" />
                </feComponentTransfer>
                <feBlend mode="screen" in2="SourceGraphic" />
              </filter>
            </defs>
            <rect width="420" height="320" fill="url(#paper)" />
            <g filter="url(#grain)">
              <ellipse cx="210" cy="137" rx="50" ry="64" fill="#b6b0aa" />
              <path d="M162 129c10-42 37-70 77-55 28 11 38 42 24 74-20-18-46-27-101-19z" fill="#4a4846" />
              <path d="M150 129c37 8 75 7 119 0 6 69-16 107-58 111-42-4-65-42-61-111z" fill="#bdb6ae" />
              <path d="M149 120c32-57 97-54 124 1-28-13-88-14-124-1z" fill="#282725" />
              <path d="M132 241c24-42 51-58 78-58s57 17 80 58l22 79H108l24-79z" fill="#373737" />
              <path d="M172 198c20 24 54 25 77 0-4 38-15 66-38 88-22-22-34-50-39-88z" fill="#242424" />
              <path d="M156 165c34 15 73 18 111 0-10 24-22 42-56 43-33-1-46-19-55-43z" fill="#77716b" />
              <path d="M169 168c16 25 69 25 85 0-6 45-17 74-43 74-25 0-36-29-42-74z" fill="#d7d1c8" />
              <path d="M175 171c11 12 25 18 36 18 12 0 26-6 37-18-3 31-13 58-37 58-23 0-33-27-36-58z" fill="#56514d" />
              <path d="M187 145c8-8 21-8 31 0M225 145c10-8 23-8 31 0" fill="none" stroke="#1a1918" stroke-width="7" stroke-linecap="round" />
              <path d="M209 151c-4 18-6 31-1 42 8 4 17 4 25 0" fill="none" stroke="#77716b" stroke-width="5" stroke-linecap="round" />
              <path d="M185 202c17 15 38 16 57 0" fill="none" stroke="#211f1f" stroke-width="6" stroke-linecap="round" />
              <path d="M143 133c-10 31-9 70 14 108 16 26 36 40 54 43 19-3 39-17 55-43 23-38 24-77 14-108-16 13-32 19-49 21 14 23 9 55-20 83-30-28-35-60-21-83-17-2-33-8-47-21z" fill="#2b2928" opacity="0.45" />
              <path d="M140 128c23 15 113 16 139 0" fill="none" stroke="#cbc4bb" stroke-width="3" opacity="0.35" />
              <path d="M129 268c50 16 112 16 164 0" fill="none" stroke="#aaa29a" stroke-width="2" opacity="0.25" />
            </g>
          </svg>
        </div>
        <p class="kicker">DOSTOEVSKY TEMPERAMENT ARCHIVE</p>
        <h1 id="siteTitle">Dostype</h1>
        <h2>陀氏人格档案</h2>
        <p class="intro">
          以 MBTI 四维为骨架，以《罪与罚》《地下室手记》《白痴》《卡拉马佐夫兄弟》的精神处境为题库。
        </p>
        <button class="primary-button" id="startButton">开始精神档案登记</button>
        <button class="ghost-button" id="caseButton">查看病例类型</button>
      </section>

      <section class="test-screen hidden" id="testScreen" aria-live="polite">
        <header class="test-header">
          <div>
            <span class="red-dot"></span>
            <span>Dostype 俄国精神诊断系统</span>
          </div>
          <span id="counter">1 / 28</span>
        </header>

        <div class="progress" aria-hidden="true">
          <span id="progressBar"></span>
        </div>

        <article class="question-card">
          <p class="source" id="sourceLabel"></p>
          <h2 id="questionText"></h2>
          <div class="answers" id="answers"></div>
        </article>

        <footer class="test-footer">
          <button class="back-button" id="backButton">退回上一念头</button>
          <p id="quoteLine">每一次选择，都是一次自供。</p>
        </footer>
      </section>

      <section class="result-screen hidden" id="resultScreen" aria-labelledby="resultTitle">
        <header class="result-header">
          <p class="kicker">CASE FILE CLOSED</p>
          <h1 id="resultTitle"></h1>
          <p id="resultSubtitle"></p>
        </header>

        <div class="result-grid">
          <article class="verdict">
            <h2>诊断书</h2>
            <p id="resultDescription"></p>
            <div class="traits" id="traitTags"></div>
          </article>

          <article class="dimension-panel">
            <h2>MBTI 维度记录</h2>
            <div id="bars"></div>
          </article>
        </div>

        <article class="reading-panel">
          <h2>推荐阅读入口</h2>
          <p id="readingPath"></p>
        </article>

        <div class="actions">
          <button class="primary-button" id="restartButton">重新审问自己</button>
          <button class="ghost-button" id="shareButton">生成一句判词</button>
        </div>
        <p class="share-line" id="shareLine"></p>
      </section>

      <aside class="case-drawer hidden" id="caseDrawer" aria-label="病例类型">
        <button class="drawer-close" id="closeCases" aria-label="关闭病例库">x</button>
        <h2>已知病例库</h2>
        <div class="case-list" id="caseList"></div>
      </aside>
    </main>

    <script src="app.js"></script>
  </body>
</html>
